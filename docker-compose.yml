# ============================================
#  RS Connect - Docker Compose
#  Usado pelo Hostinger Docker Manager
# ============================================

services:
  rsconnect-app:
    build: .
    container_name: rsconnect-app
    restart: unless-stopped
    ports:
      - "2020:3000"
    volumes:
      # Persiste o banco SQLite entre rebuilds
      - rsconnect-data:/app/.data
    environment:
      - NODE_ENV=production
      # As variáveis ML_APP_ID, ML_CLIENT_SECRET, ML_REDIRECT_URI e BASE_URL
      # devem ser configuradas no painel da Hostinger (Gerenciador Docker > Variáveis de Ambiente)
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rsconnect.rule=Host(`full.rsconnect.com.br`)"
      - "traefik.http.routers.rsconnect.entrypoints=websecure"
      - "traefik.http.routers.rsconnect.tls.certresolver=letsencrypt"
      - "traefik.http.services.rsconnect.loadbalancer.server.port=3000"

volumes:
  rsconnect-data:
    name: rsconnect_database_vol
