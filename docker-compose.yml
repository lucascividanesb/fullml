version: '3.8'

services:
  magiiv-app:
    build: .
    container_name: magiiv-app
    restart: unless-stopped
    # ⚠️ A PORTA FOI OCULTADA PRO CADDY APONTAR COM SEGURANÇA SEM VAZAR PRA REDE.
    expose:
      - "3000"
    volumes:
      - magiiv-data:/app/.data
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production

  caddy:
    image: caddy:2-alpine
    container_name: caddy-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - magiiv-app

volumes:
  magiiv-data:
    name: magiiv_database_vol
  caddy-data:
  caddy-config:
