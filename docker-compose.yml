version: '3.8'

services:
  magiiv-app:
    build: .
    container_name: magiiv-app
    restart: unless-stopped
    ports:
      # Mapeando agora a porta 2020 do seu servidor para a 3000 do App
      - "2020:3000"
    volumes:
      - magiiv-data:/app/.data
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    labels:
      - "traefik.enable=true"
      # Aqui dizemos pro Traefik que o seu domínio aponta para esse App
      - "traefik.http.routers.magiiv-app.rule=Host(`full.rsconnect.com.br`)"
      - "traefik.http.routers.magiiv-app.entrypoints=websecure"
      - "traefik.http.routers.magiiv-app.tls.certresolver=letsencrypt"
      - "traefik.http.services.magiiv-app.loadbalancer.server.port=3000"

volumes:
  magiiv-data:
    name: magiiv_database_vol
